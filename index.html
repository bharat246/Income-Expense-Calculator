<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Income Expense Calculator</h1>

    <!-- Top Summary Section -->
    <div class="summary">
        <div class="card">
            <h3>Total Income</h3>
            <p id="total-income">₹0</p>
        </div>

        <div class="card">
            <h3>Total Expense</h3>
            <p id="total-expense">₹0</p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p id="balance">₹0</p>
        </div>
    </div>

    <!-- Input Form -->
    <div class="form">
        <input type="text" id="desc" placeholder="Enter Description">
        <input type="number" id="amount" placeholder="Enter Amount">

        <label for="type">Type</label>
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button id="add-btn">Add</button>
        <button id="reset-btn" class="reset">Reset</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <label><input type="radio" name="filter" value="all" checked> All</label>
        <label><input type="radio" name="filter" value="income"> Income</label>
        <label><input type="radio" name="filter" value="expense"> Expense</label>
    </div>

    <!-- List of entries -->
    <ul id="list"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
